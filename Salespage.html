<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สินค้าและบริการ | NRRU Shop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">NRRU <span>SHOP</span></div>
            <ul class="nav-links">
                <li><a href="index.html">หน้าแรก</a></li>
                <li><a href="Salespage.html" class="active">สินค้า/บริการ</a></li>
                <li><a href="about.html">ข้อมูลส่วนตัว</a></li>
                <li><a href="contact.html">ติดต่อเรา</a></li>
            </ul>
        </nav>
    </header>

    <div class="cart-container">
        <div class="cart-status">
            <img src="32.jpg" alt="cart" class="cart-icon">
            <span>ตะกร้า:</span> <b id="cart-count">0</b>
        </div>
    </div>

    <main class="container">
        <h2 class="section-title">รายการสินค้าทั้งหมด</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="1.jpg" alt="เสื้อโปโล">
                <h3>เสื้อโปโลคณะวิทยาศาสตร์ฯ</h3>
                <p class="price">฿350</p>
                <button class="btn-buy" onclick="addToCart('เสื้อโปโล', 350)">+ เพิ่มลงตะกร้า</button>
            </div>
            <div class="product-card">
                <img src="2.jpg" alt="เสื้อตะโกราย">
                <h3>เสื้อตะโกราย Sci-Tech</h3>
                <p class="price">฿360</p>
                <button class="btn-buy" onclick="addToCart('เสื้อตะโกราย', 360)">+ เพิ่มลงตะกร้า</button>
            </div>
            <div class="product-card">
                <img src="3.jpg" alt="เสื้อนักกีฬา">
                <h3>เสื้อตะโกราย นักกีฬา</h3>
                <p class="price">฿360</p>
                <button class="btn-buy" onclick="addToCart('เสื้อนักกีฬา', 360)">+ เพิ่มลงตะกร้า</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 NRRU SHOP | Science & Technology Club</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
